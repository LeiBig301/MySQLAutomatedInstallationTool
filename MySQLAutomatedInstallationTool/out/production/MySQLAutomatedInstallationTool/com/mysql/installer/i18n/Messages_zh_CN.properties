# Installation process messages
message.install.process=安装流程：\n1. 下载 MySQL 安装包\n2. 解压到指定目录\n3. 初始化数据库\n4. 注册 Windows 服务\n5. 启动服务\n6. 设置 root 密码\n7. 配置环境变量\n\n预计耗时：2-5 分钟
message.download.process=开始下载 MySQL {0}\n\n下载策略：\n- 首先尝试 Java 原生下载\n- 失败后自动切换到 curl 命令\n- 支持多版本选择\n\n下载完成后会自动解压
message.init.process=开始初始化数据库\n\n初始化过程包括：\n1. 创建系统表\n2. 生成初始数据\n3. 配置权限\n\n此过程可能需要 1-3 分钟
message.service.register.process=开始注册 Windows 服务\n\n注册过程包括：\n1. 停止并删除已存在的同名服务\n2. 注册新的服务\n3. 配置服务参数\n\n此过程需要管理员权限
message.service.start.process=开始启动 MySQL 服务\n\n启动过程包括：\n1. 启动服务进程\n2. 验证服务状态\n3. 确认服务运行正常\n\n此过程可能需要 30-60 秒
message.password.process=开始设置 root 密码\n\n设置过程包括：\n1. 连接到 MySQL 服务器\n2. 执行密码设置命令\n3. 验证密码设置成功\n\n此过程需要 MySQL 服务正常运行
message.env.process=开始添加环境变量\n\n添加过程包括：\n1. 读取当前系统 PATH\n2. 添加 MySQL bin 目录\n3. 保存新的环境变量\n\n此操作需要管理员权限，添加后需要重启终端才能生效
